<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingenium Dashboard</title>

    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Ingenium</h2>

        <a href="#">🏠 Dashboard</a>
        <a href="#" id="teamBtn">👥 Team Members</a>
        <a href="#">📁 Projects</a>
        <a href="#">🏆 Achievements</a>
        <a href="#">📅 Events</a>
        <a href="#">🖼 Gallery</a>
        <a href="#">📨 Messages</a>
        <a href="#">⚙ Settings</a>

        <hr>

        <button id="logoutBtn">Logout</button>

    </div>

    <!-- Main Content -->
    <div class="content">

        <div class="topbar">

            <div>
                <h2>Dashboard</h2>
                <p id="userName"></p>
            </div>

            <div class="profile">
                👤
            </div>

        </div>

        <div id="teamSection">

            <div class="section-header">

                <h2>Team Members</h2>

                <button id="addMemberBtn">
                    + Add Member
                </button>

            </div>

            <div id="membersGrid"></div>

        </div>

    </div>

    <!-- Add Member Modal -->
    <div id="memberModal" class="modal">

        <div class="modal-content">

            <h2>Add Team Member</h2>

            <input type="text" id="memberName" placeholder="Full Name">

            <select id="memberRole">
                <option value="">Select Role</option>
                <option>Team Leader</option>
                <option>Vice Leader</option>
                <option>HR Head</option>
                <option>Technical Head</option>
                <option>Non-Technical Head</option>
                <option>Member</option>
            </select>

<select id="department">
    <option value="Leadership">Leadership</option>
    <option value="Management">Management</option>
    <option value="Mechanical Track">Mechanical Track</option>
    <option value="Software Track">Software Track</option>
    <option value="Hardware Track">Hardware Track</option>
    <option value="Robotics Track">Robotics Track</option>
    <option value="Business Track">Business Track</option>
    <option value="Media Track">Media Track</option>
    <option value="Logistics Track">Logistics Track</option>
</select>
            <input type="email" id="memberEmail" placeholder="Email">

            <input
    type="number"
    id="displayOrder"
    placeholder="Display Order">

            <label>Photo (Optional)</label>
            <input type="file" id="memberImage" accept="image/*">

            <button id="saveMemberBtn">
                Save Member
            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

</body>

</html>
